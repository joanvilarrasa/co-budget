<div id="accounts-page" class="flex flex-1 flex-col gap-4 p-4 overflow-auto">
    <h2 class="text-lg font-semibold">Accounts</h2>

    {{if .Error}}
    <div class="border border-red-300 bg-red-50 px-3 py-2 text-sm text-red-700">
        {{.Error}}
    </div>
    {{end}}

    <div class="flex w-full items-center justify-end">
        <button type="button" onclick="document.getElementById('create-account-dialog').showModal()"
            class="btn-primary">New Account</button>
    </div>

    <dialog id="create-account-dialog" class="dialog">
        <form action="/accounts/new" method="post"
            data-on:submit="evt.preventDefault(); @post('/accounts/new', {contentType: 'form'}).then(() => { evt.target.reset(); }); document.getElementById('create-account-dialog').close()"
            class="flex flex-col gap-2 text-[var(--color-foreground)]">
            <header class="flex gap-2 w-full">
                <h2 id="alert-dialog-title">Create a new account</h2>
            </header>

            <div class="flex gap-4">
                <div class="flex flex-col gap-2 w-[300px]">
                    <label class="label">Name</label>
                    <input class="input" type="text" name="name" required />
                </div>
                <div class="flex flex-col gap-2">
                    <label class="label">Type</label>
                    <select class="select w-[100px]" name="type" required>
                        <optgroup label="Type">
                            <option value="LTB">LTB</option>
                            <option value="MTB">MTB</option>
                            <option value="STB">STB</option>
                        </optgroup>
                    </select>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="label whitespace-nowrap">Initial balance</label>
                    <input class="input" type="number" name="initial_balance" required step="100.00" />
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <label class="label">Description</label>
                <input class="input" type="text" name="description" required />
            </div>

            <footer class="flex w-full items-center justify-end gap-2">
                <button class="btn-outline" type="button"
                    onclick="document.getElementById('create-account-dialog').close()">Cancel</button>
                <button class="btn-primary" type="submit">Create</button>
            </footer>
        </form>
    </dialog>

    <section class="rounded border p-4">
        <h3 class="mb-3 text-sm font-semibold uppercase tracking-wide text-gray-700">Existing accounts</h3>
        {{.Table}}
    </section>
</div>
